name: release
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      prerelease:
        description: prerelease identifier; use dev to publish @dev
        required: false
        default: ""
        type: string
jobs:
  publish_dev:
    name: Publish npm dev build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      CI: "true"
    if: github.event_name == 'workflow_dispatch' && inputs.prerelease == 'dev'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Specific Yarn Version
        run: corepack enable && corepack prepare yarn@4.6.0 --activate
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.11.1
          package-manager-cache: false
      - name: Install dependencies
        run: yarn install --immutable
      - name: Set next dev version
        run: |-
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const fs = require("node:fs");

          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const distTags = JSON.parse(
            execFileSync("npm", ["view", packageJson.name, "dist-tags", "--json"], {
              encoding: "utf8",
            }),
          );
          const latest = distTags.latest ?? "0.0.0";
          const stableBase = latest.split("-")[0];
          const [major, minor, patch] = stableBase.split(".").map(Number);

          if (![major, minor, patch].every(Number.isInteger)) {
            throw new Error("Cannot derive next dev version from npm latest dist-tag: " + latest);
          }

          const runNumber = process.env.GITHUB_RUN_NUMBER;
          const runAttempt = process.env.GITHUB_RUN_ATTEMPT ?? "1";
          const devVersion = [major, minor, patch + 1].join(".") + "-dev." + runNumber + "." + runAttempt;

          packageJson.version = devVersion;
          fs.writeFileSync("package.json", JSON.stringify(packageJson, null, 2) + "\n");
          fs.appendFileSync(process.env.GITHUB_ENV, "DEV_VERSION=" + devVersion + "\n");
          NODE
      - name: Test
        run: yarn test
      - name: Prepare package output
        run: mkdir -p dist
      - name: Pack
        run: npm pack --pack-destination dist
      - name: Publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: npm publish dist/*.tgz --tag dev --access public
  release_please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name != 'workflow_dispatch' || inputs.prerelease != 'dev'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
  publish_npm:
    needs: release_please
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      CI: "true"
    if: ${{ needs.release_please.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Specific Yarn Version
        run: corepack enable && corepack prepare yarn@4.6.0 --activate
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.11.1
          package-manager-cache: false
      - name: Install dependencies
        run: yarn install --immutable
      - name: Test
        run: yarn test
      - name: Publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: npm publish --access public
